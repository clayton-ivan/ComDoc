<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cotação</title>

    <link rel="stylesheet" href="/cotacaoForm/cotacaoForm.css">
</head>

<body>

    <h1>Nova Cotação</h1>

    <form id="formulario">

        <fieldset>
            <legend>Dados do Cliente</legend>

            <label for="contato">Contato</label>
            <input type="text" id="contato" required>

            <label for="email">E-mail</label>
            <input type="email" id="email">

            <label for="telefone">Telefone</label>
            <input
				type="text"
				id="telefone"
				inputmode="numeric"
				maxlength="15"
				required>

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco">

            <label for="cnpj">CNPJ</label>
            <input
				type="text"
				id="cnpj"
				inputmode="numeric"
				maxlength="18"
				required>
        </fieldset>

        <fieldset>
			<legend>Produto</legend>

			<label for="produto">Produto</label>

			<select id="produto" required>
				<option value="">Carregando produtos...</option>
			</select>
		</fieldset>

        <fieldset>
			<legend>Itens da Proposta</legend>

			<div class="tabela-itens-container">
				<table class="tabela-itens-form">
					<thead>
						<tr>
							<th>Item</th>
							<th>Quantidade</th>
							<th>Valor Unitário</th>
							<th>Total</th>
						</tr>
					</thead>

					<tbody id="itensProduto">
						<tr>
							<td colspan="4">
								Selecione um produto.
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<label for="valorTotal">Valor Total da Proposta</label>

			<input
				type="text"
				id="valorTotal"
				readonly>
		</fieldset>

        <fieldset>
            <legend>Condições Comerciais</legend>

            <label for="prazoEntrega">Prazo de Entrega</label>
            <input type="text" id="prazoEntrega">

            <label for="pagamento">Forma de Pagamento</label>
            <input type="text" id="pagamento">
        </fieldset>

        <button type="submit">
            Gerar Cotação
        </button>

    </form>

    <script
		type="module"
		src="/cotacaoForm/cotacaoForm.js">
	</script>

</body>

</html>

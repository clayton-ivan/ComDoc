<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ComDoc - Nova Cotação</title>

    <link
        rel="stylesheet"
        href="/cotacaoForm/cotacaoForm.css">
</head>

<body>
    <header class="topbar">
        <div class="marca">ComDoc</div>

        <a
            href="/admin/produtos"
            class="link-topbar">
            Produtos
        </a>
    </header>

    <main class="container">
        <header class="cabecalho-pagina">
            <div>
                <h1>Nova cotação</h1>

                <p>
                    Preencha os dados para gerar uma proposta comercial.
                </p>
            </div>
        </header>

        <form id="formulario">
            <section class="card">
                <h2>Dados do cliente</h2>

                <div class="grid">
                    <div class="campo">
                        <label for="contato">Contato</label>

                        <input
                            type="text"
                            id="contato"
                            autocomplete="name"
                            required>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail</label>

                        <input
                            type="email"
                            id="email"
                            inputmode="email"
                            autocomplete="email">
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone</label>

                        <input
                            type="text"
                            id="telefone"
                            inputmode="numeric"
                            autocomplete="tel"
                            maxlength="15"
                            required>
                    </div>

                    <div class="campo">
                        <label for="cnpj">CNPJ</label>

                        <input
                            type="text"
                            id="cnpj"
                            inputmode="numeric"
                            maxlength="18"
                            required>
                    </div>

                    <div class="campo campo-largo">
                        <label for="endereco">Endereço</label>

                        <input
                            type="text"
                            id="endereco"
                            autocomplete="street-address">
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Produto</h2>

                <div class="campo">
                    <label for="produto">Produto</label>

                    <select
                        id="produto"
                        required>
                        <option value="">
                            Carregando produtos...
                        </option>
                    </select>
                </div>
            </section>

            <section class="card">
                <h2>Itens da proposta</h2>

                <div
					id="itensProduto"
					class="itens-proposta">

					<p class="mensagem-itens">
						Selecione um produto.
					</p>
				</div>

                <div class="total-proposta">
                    <label for="valorTotal">
                        Valor total da proposta
                    </label>

                    <input
                        type="text"
                        id="valorTotal"
                        readonly>
                </div>
            </section>

            <section class="card">
                <h2>Condições comerciais</h2>

                <div class="grid">
                    <div class="campo">
                        <label for="prazoEntrega">
                            Prazo de entrega
                        </label>

                        <input
                            type="text"
                            id="prazoEntrega">
                    </div>

                    <div class="campo">
                        <label for="pagamento">
                            Forma de pagamento
                        </label>

                        <input
                            type="text"
                            id="pagamento">
                    </div>
                </div>
            </section>

            <div class="acoes-formulario">
                <button
                    type="submit"
                    class="botao-primario">
                    Gerar cotação
                </button>
            </div>
        </form>
    </main>

    <script
        type="module"
        src="/cotacaoForm/cotacaoForm.js">
    </script>
</body>
</html>
